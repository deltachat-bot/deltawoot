name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'
      - run: |
          export DELTAWOOT_INVITE="${{ secrets.DELTAWOOT_INVITE }}"
          export DELTAWOOT_ADDR="${{ secrets.DELTAWOOT_ADDR }}"
          export WOOT_PROFILE_ACCESS_TOKEN="${{ secrets.WOOT_PROFILE_ACCESS_TOKEN }}"
          export WOOT_URL="${{ secrets.WOOT_URL }}"
          tox
